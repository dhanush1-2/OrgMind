name: Backend CI

on:
  push:
    branches: [backend, main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [backend, main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # Dummy values — agents are fully mocked in tests
          GROQ_API_KEY: "dummy"
          SUPABASE_URL: "https://dummy.supabase.co"
          SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy"
          DATABASE_URL: "postgresql://user:pass@localhost/db"
          NEO4J_URI: "neo4j+s://dummy.databases.neo4j.io"
          NEO4J_USER: "neo4j"
          NEO4J_PASSWORD: "dummy"
          UPSTASH_REDIS_REST_URL: "https://dummy.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "dummy"
          SLACK_BOT_TOKEN: ""
          NOTION_API_KEY: ""
          GOOGLE_CLIENT_ID: ""
          GOOGLE_CLIENT_SECRET: ""
          GOOGLE_REFRESH_TOKEN: ""
        run: python -m pytest tests/ -q --tb=short

      - name: Verify imports
        env:
          GROQ_API_KEY: "dummy"
          SUPABASE_URL: "https://dummy.supabase.co"
          SUPABASE_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy"
          DATABASE_URL: "postgresql://user:pass@localhost/db"
          NEO4J_URI: "neo4j+s://dummy.databases.neo4j.io"
          NEO4J_USER: "neo4j"
          NEO4J_PASSWORD: "dummy"
          UPSTASH_REDIS_REST_URL: "https://dummy.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "dummy"
        run: python -c "from app.main import app; print('FastAPI app import OK')"
