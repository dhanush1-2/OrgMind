version: "3.9"

services:
  # ── ChromaDB (vector store — local only) ────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: orgmind-chroma
    ports:
      - "8001:8000"           # host 8001 → container 8000 (avoids clash with FastAPI)
    volumes:
      - chroma_data:/chroma/.chroma/index
    environment:
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend (local dev only — production uses Render) ───────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orgmind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./backend:/app           # hot-reload in dev
      - ./logs:/app/logs
    depends_on:
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  chroma_data:
